title: Bar Charts
name: jjbarstats
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: CollapseBox
    label: Quick Clinical Setup
    collapsed: true
    children:
      - type: ComboBox
        name: clinicalpreset
        label: Analysis type
      - type: CheckBox
        name: showexplanations
        label: Clinical guidance
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Outcome Variable (what you're measuring)
        children:
          - type: VariablesListBox
            name: dep
            isTarget: true
      - type: TargetLayoutBox
        label: Group Variable (what you're comparing)
        children:
          - type: VariablesListBox
            name: group
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Subgroup Analysis (Optional)
        children:
          - type: VariablesListBox
            name: grvar
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Frequency Counts (Optional)
        children:
          - type: VariablesListBox
            name: counts
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: Statistical Analysis
    collapsed: true
    children:
      - type: Label
        label: Data Handling
        fitToGrid: true
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: excl
                label: Exclude missing data
              - type: CheckBox
                name: paired
                label: Paired/Matched data (McNemar's test)
      - type: Label
        label: Statistical Method
        fitToGrid: true
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: ComboBox
                name: typestatistics
                label: Test type
              - type: CheckBox
                name: proportiontest
                label: Proportion tests
              - type: CheckBox
                name: bfmessage
                label: Bayes factor (for Bayesian)
      - type: Label
        label: Post-hoc Comparisons (when >2 groups)
        fitToGrid: true
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: pairwisecomparisons
                label: Perform group-by-group comparisons
                children:
                  - type: ComboBox
                    name: pairwisedisplay
                    label: Results
                    enable: (pairwisecomparisons)
                  - type: ComboBox
                    name: padjustmethod
                    label: Multiple comparison correction
                    enable: (pairwisecomparisons)
      - type: Label
        label: Advanced Parameters
        fitToGrid: true
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: conflevel
                label: Confidence Level (0.90-0.99)
                format: number
              - type: TextBox
                name: ratio
                label: Expected Proportions (e.g., 0.5,0.5)
                format: string
  - type: CollapseBox
    label: Plot Appearance
    collapsed: true
    children:
      - type: Label
        label: Plot Styling
        fitToGrid: true
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: originaltheme
                label: ggstatsplot theme
              - type: CheckBox
                name: resultssubtitle
                label: Statistics in plot subtitle
              - type: CheckBox
                name: messages
                label: Console messages
      - type: Label
        label: Bar Chart Labels
        fitToGrid: true
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: ComboBox
                name: label
                label: Bar label type
              - type: TextBox
                name: digits
                label: Decimal Places (Statistics)
                format: number
              - type: TextBox
                name: digitsperc
                label: Decimal Places (Percentages)
                format: number
  - type: CollapseBox
    label: Balloon Plot (ggpubr)
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: addGGPubrBalloon
            children:
              - type: ComboBox
                name: ggpubrBalloonPalette
                enable: (addGGPubrBalloon)
  - type: CollapseBox
    label: Report & Explanations
    collapsed: true
    children:
      - type: Label
        label: Educational Content
        fitToGrid: true
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: showSummary
                label: Analysis summary
              - type: CheckBox
                name: showAssumptions
                label: Assumptions & warnings
              - type: CheckBox
                name: showInterpretation
                label: Interpretation guide
