---
name: lollipop
title: Lollipop Chart
jrs: '1.1'

items:
    - name: notices
      title: Important Information
      type: Preformatted
      # No clearWith needed: .run() calls private$.renderNotices() unconditionally at
      # the end of every run (and in the error handler), which sets the content to ""
      # whenever the current run emits no notices, so stale notices cannot persist.

    - name: todo
      title: Instructions
      type: Html
      visible: true

    - name: summary
      title: Data Summary
      type: Table
      columns:
        - name: statistic
          title: Statistic
          type: text
        - name: value
          title: Value
          type: text

    - name: plot
      title: '`Lollipop Chart {dep} vs {group}`'
      type: Image
      width: 800
      height: 600
      renderFun: .plot
      requiresData: true

refs:
    - ClinicoPathJamoviModule
    - RGraphGallery
    - ggplot2


...
